<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

            box-shadow: 0 0 0 4px currentColor;
        }
        .text-glow-red {
            text-shadow: 0 0 10px rgba(255, 180, 171, 0.5);
        }

<body class="bg-background text-on-surface font-body-md overflow-hidden">
<div class="flex flex-col items-center justify-center min-h-screen w-full px-margin-mobile">
<!-- Massive Centered Title -->
<h1 class="font-headline-lg text-[72px] leading-none text-error tracking-tighter uppercase mb-unit-4 text-glow-red text-center">
            GAME OVER
        </h1>
<!-- 2px White Divider -->
<div class="w-[400px] h-[2px] bg-on-surface mb-unit-8"></div>
<!-- Narrative Text -->
<div class="text-center mb-12">
<p class="font-body-lg text-on-surface italic leading-relaxed">
                You cannot give up just yet...<br/>
                Your soul still burns with determination.
            </p>
</div>
<!-- Stacked Buttons Container -->
<div class="flex flex-col gap-6 items-center w-full max-w-[300px]">
<!-- RETRY PHASE Button -->
<button class="w-[300px] h-[60px] bg-transparent border-[4px] border-primary-container text-primary-container flex items-center justify-center gap-unit-2 hover:bg-primary-container hover:text-surface transition-colors">
<span class="material-symbols-outlined text-[24px]" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="font-label-lg text-[20px] uppercase tracking-wider">RETRY PHASE</span>
</button>
<!-- RETURN TO MENU Button -->
<button class="w-[300px] h-[60px] bg-transparent border-[4px] border-on-surface text-on-surface flex items-center justify-center gap-unit-2 hover:bg-on-surface hover:text-surface transition-colors">
<span class="material-symbols-outlined text-[24px]" data-icon="arrow_back">arrow_back</span>
<span class="font-label-lg text-[20px] uppercase tracking-wider">RETURN TO MENU</span>
</button>
</div>
<!-- Spacer for Layout Balance -->
<div class="h-24"></div>
<!-- Footer Instructions -->
<footer class="fixed bottom-unit-8 left-0 right-0 text-center">
<p class="font-label-sm text-secondary text-[14px] uppercase tracking-[0.2em]">
                [↑↓] NAVIGATE     [Z] CONFIRM
            </p>
</footer>
</div>
<!-- Hidden shared components logic as per instructions (excluding nav because this is a focused view) -->
<!-- The Shared HeadlineText component is provided in the prompt but explicitly excluded for "Booking/Process" style screens.
