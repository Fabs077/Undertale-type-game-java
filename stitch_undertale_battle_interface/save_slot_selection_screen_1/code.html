</header>
<!-- Main Content: Slot Selection -->
<main class="flex flex-col items-center justify-center w-full max-w-2xl px-margin-mobile flex-grow gap-unit-4 py-8">
<!-- Slot 1 (Selected) -->
<button class="w-full border-4-orange bg-black p-unit-4 flex flex-col md:flex-row justify-between items-start md:items-center cursor-pointer transition-all active:scale-95 text-left group hover:bg-surface-container-low">
<div class="flex flex-col gap-unit-2">
<span class="font-headline-md text-headline-md text-orange">SLOT 1</span>
<span class="font-body-lg text-body-lg text-on-surface group-hover:text-orange transition-colors">KRIS - LV 1</span>
</div>
<div class="flex flex-col gap-unit-2 items-start md:items-end mt-4 md:mt-0 text-secondary">
<span class="font-body-md text-body-md">THE RUINS</span>
<span class="font-body-md text-body-md">12:45</span>
</div>
</button>
<!-- Slot 2 (Unselected) -->
<button class="w-full border-4-white bg-black p-unit-4 flex flex-col md:flex-row justify-between items-start md:items-center cursor-pointer transition-all hover:border-4-orange active:scale-95 text-left group hover:bg-surface-container-low">
<div class="flex flex-col gap-unit-2">
<span class="font-headline-md text-headline-md text-on-surface group-hover:text-orange transition-colors">SLOT 2</span>
<span class="font-body-lg text-body-lg text-secondary">---EMPTY---</span>
</div>
<div class="flex flex-col gap-unit-2 items-start md:items-end mt-4 md:mt-0 text-surface-variant">
<span class="font-body-md text-body-md">----------</span>
<span class="font-body-md text-body-md">--:--</span>
</div>
</button>

<div class="flex flex-col gap-unit-2">
<span class="font-headline-md text-headline-md text-on-surface group-hover:text-orange transition-colors">SLOT 3</span>
<span class="font-body-lg text-body-lg text-secondary">---EMPTY---</span>
</div>
<div class="flex flex-col gap-unit-2 items-start md:items-end mt-4 md:mt-0 text-surface-variant">
<span class="font-body-md text-body-md">----------</span>
<span class="font-body-md text-body-md">--:--</span>
</div>
</button>
